<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoT — Conversational Incoherence</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0d1117; color: #c9d1d9;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Header */
header {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 14px 24px; display: flex; align-items: center; gap: 16px;
}
header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
header .subtitle { font-size: 13px; color: #8b949e; }
.mode-banner { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-left: 12px; letter-spacing: 0.05em; }
.mode-synthetic { background: #3d2200; color: #f0883e; }
.mode-live { background: #1a3d1a; color: #56d364; }

/* Coherence timeline strip */
.timeline-strip {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
}
.timeline-strip .score-badge {
  font-size: 32px; font-weight: 700; line-height: 1; min-width: 72px;
  text-align: center;
}
.timeline-strip .score-label {
  font-size: 11px; font-weight: 600; text-align: center;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.timeline-strip .score-section {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.timeline-chart { flex: 1; height: 56px; }
.timeline-controls {
  display: flex; gap: 8px; align-items: center;
}
.timeline-controls button {
  padding: 6px 12px; border-radius: 6px; border: 1px solid #30363d;
  background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px;
}
.timeline-controls button:hover { background: #30363d; }
.timeline-controls button.active { background: #238636; border-color: #238636; color: #fff; }

/* Main layout */
.container { display: flex; flex: 1; overflow: hidden; }

/* Chat panel */
.chat-panel {
  width: 480px; min-width: 380px; background: #0d1117;
  border-right: 1px solid #30363d;
  display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
.chat-header {
  padding: 14px 20px; border-bottom: 1px solid #30363d;
  font-size: 14px; font-weight: 600; color: #f0f6fc;
  background: #161b22; position: sticky; top: 0; z-index: 5;
}
.chat-body { flex: 1; padding: 16px; overflow-y: auto; min-height: 0; }

/* Messages */
.message {
  margin-bottom: 16px; cursor: pointer; transition: all 0.15s;
  border-radius: 12px; border: 2px solid transparent;
}
.message:hover { border-color: #30363d; }
.message.selected { border-color: #58a6ff; }
.message.dimmed { opacity: 0.4; }

.msg-bubble {
  padding: 12px 16px; border-radius: 12px;
  max-width: 100%; font-size: 14px; line-height: 1.5;
}
.msg-speaker-a .msg-bubble { background: #1c2333; border: 1px solid #30363d; }
.msg-speaker-b .msg-bubble { background: #1a2634; border: 1px solid #1f3a52; }

.msg-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.msg-speaker {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.3px;
}
.msg-speaker-a .msg-speaker { color: #a5d6ff; }
.msg-speaker-b .msg-speaker { color: #7ee787; }
.msg-turn { font-size: 11px; color: #484f58; }

.msg-text { margin-bottom: 8px; }

/* Value chips inside messages */
.msg-values { display: flex; flex-wrap: wrap; gap: 4px; }
.value-chip {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 500;
  background: #21262d; border: 1px solid #30363d; color: #8b949e;
}
.value-chip.new { background: rgba(88,166,255,0.12); border-color: #58a6ff; color: #58a6ff; }
.value-chip.negative { background: rgba(248,81,73,0.08); border-color: rgba(248,81,73,0.4); color: #f85149; }
.value-chip small { opacity: 0.7; font-size: 10px; }

/* New contradiction alert */
.contradiction-alert {
  margin-top: 8px; padding: 6px 10px; border-radius: 6px;
  background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.25);
  font-size: 12px; color: #f85149;
}
.contradiction-alert .alert-icon { margin-right: 4px; }

/* Analysis panel */
.analysis-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.analysis-panel .tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid #30363d;
  background: #161b22; flex-shrink: 0;
}
.tab-btn {
  padding: 10px 18px; background: none; border: none;
  border-bottom: 2px solid transparent;
  color: #8b949e; cursor: pointer; font-size: 13px; font-weight: 500;
}
.tab-btn.active { color: #f0f6fc; border-bottom-color: #f78166; }
.tab-btn:hover { color: #c9d1d9; }
.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 20px; }
.tab-panel.active { display: block; }

/* Contradiction / redundancy cards */
.finding-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px 16px; margin-bottom: 8px;
}
.finding-card.severe { border-left: 3px solid #f85149; }
.finding-card.moderate { border-left: 3px solid #f0883e; }
.finding-card.mild { border-left: 3px solid #d29922; }
.finding-card.redundant { border-left: 3px solid #58a6ff; }
.finding-card.is-new { box-shadow: 0 0 0 1px rgba(248,81,73,0.4); }
.finding-header { display: flex; justify-content: space-between; align-items: center; }
.finding-terms { font-weight: 600; font-size: 14px; }
.finding-badge {
  padding: 2px 8px; border-radius: 12px; font-size: 10px;
  font-weight: 600; text-transform: uppercase;
}
.finding-badge.severe { background: rgba(248,81,73,0.15); color: #f85149; }
.finding-badge.moderate { background: rgba(240,136,62,0.15); color: #f0883e; }
.finding-badge.mild { background: rgba(210,153,34,0.15); color: #d29922; }
.finding-badge.redundant { background: rgba(88,166,255,0.15); color: #58a6ff; }
.finding-badge.new-badge { background: rgba(248,81,73,0.2); color: #f85149; margin-left: 6px; }
.finding-metrics { font-size: 12px; color: #8b949e; margin-top: 4px; }

/* Viz containers */
.viz-container { display: flex; justify-content: center; padding-top: 10px; }
svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

/* Heatmap tooltip */
.heatmap-tooltip {
  position: absolute; padding: 6px 10px; background: #21262d;
  border: 1px solid #30363d; border-radius: 6px; font-size: 12px;
  color: #c9d1d9; pointer-events: none; opacity: 0; z-index: 20;
}

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: #484f58;
}
.empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #8b949e; }
.empty-state p { font-size: 13px; }

/* Loading spinner */
.spinner {
  display: none; width: 24px; height: 24px;
  border: 3px solid #30363d; border-top-color: #58a6ff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  margin: 20px auto;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Value term legend beneath timeline */
.term-legend {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 8px 24px; display: flex; flex-wrap: wrap; gap: 4px;
  font-size: 11px;
}
.term-legend .legend-chip {
  padding: 2px 8px; border-radius: 10px;
  background: #21262d; border: 1px solid #30363d; color: #8b949e;
  transition: all 0.15s;
}
.term-legend .legend-chip.active {
  background: rgba(88,166,255,0.12); border-color: #58a6ff; color: #58a6ff;
}
</style>
</head>
<body>

<header>
  <h1>Geometry of Trust</h1>
  <span class="subtitle">Conversational Incoherence Tracker</span>
  <span id="modeBanner" class="mode-banner mode-synthetic">SYNTHETIC DEMO</span>
</header>

<!-- Coherence timeline -->
<div class="timeline-strip">
  <div class="score-section">
    <div class="score-badge" id="scoreValue">--</div>
    <div class="score-label" id="scoreLabel">COHERENCE</div>
  </div>
  <div class="score-section">
    <div class="score-badge" id="trustValue">--</div>
    <div class="score-label" id="trustLabel">TRUST</div>
  </div>
  <div class="timeline-chart" id="timelineChart"></div>
  <div class="timeline-controls">
    <button id="btnPrev" title="Previous turn">&laquo;</button>
    <button id="btnPlay" title="Play/pause">&#x25B6;</button>
    <button id="btnNext" title="Next turn">&raquo;</button>
    <button id="btnLoadDemo">Load Demo</button>
  </div>
</div>

<!-- Cumulative values strip -->
<div class="term-legend" id="termLegend"></div>

<div class="container">
  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">Conversation</div>
    <div class="chat-body" id="chatBody">
      <div class="empty-state" id="emptyChat">
        <h2>No conversation loaded</h2>
        <p>Click "Load Demo" to see a sample conversation<br>
        and watch incoherence emerge turn by turn.</p>
      </div>
    </div>
  </div>

  <!-- Analysis panel -->
  <div class="analysis-panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="contradictions">Contradictions</button>
      <button class="tab-btn" data-tab="redundancies">Redundancies</button>
      <button class="tab-btn" data-tab="chord">Chord Diagram</button>
      <button class="tab-btn" data-tab="heatmap">Heatmap</button>
      <button class="tab-btn" data-tab="sphere">Sphere</button>
    </div>
    <div class="tab-panel active" id="tab-contradictions">
      <div class="empty-state"><p>Load a conversation to begin analysis</p></div>
    </div>
    <div class="tab-panel" id="tab-redundancies">
      <div class="empty-state"><p>Load a conversation to begin analysis</p></div>
    </div>
    <div class="tab-panel" id="tab-chord">
      <div class="viz-container" id="chordViz"></div>
    </div>
    <div class="tab-panel" id="tab-heatmap">
      <div class="viz-container" id="heatmapViz"></div>
    </div>
    <div class="tab-panel" id="tab-sphere">
      <div class="viz-container" id="sphereViz"></div>
    </div>
  </div>
</div>

<div class="heatmap-tooltip" id="tooltip"></div>
<div class="spinner" id="spinner"></div>

<script>
(function() {
  'use strict';

  // ---- State ----
  let conversation = null;   // raw conversation data
  let analysis = null;       // API response with per-turn analysis
  let currentTurn = -1;      // which turn we're viewing (-1 = none)
  let playInterval = null;
  let speakerMap = {};       // speaker id -> metadata

  // ---- DOM refs ----
  const scoreValue    = document.getElementById('scoreValue');
  const scoreLabel    = document.getElementById('scoreLabel');
  const trustValue    = document.getElementById('trustValue');
  const trustLabel    = document.getElementById('trustLabel');
  const timelineChart = document.getElementById('timelineChart');
  const termLegend    = document.getElementById('termLegend');
  const chatHeader    = document.getElementById('chatHeader');
  const chatBody      = document.getElementById('chatBody');
  const emptyChat     = document.getElementById('emptyChat');
  const spinner       = document.getElementById('spinner');
  const tooltip       = document.getElementById('tooltip');
  const btnPrev       = document.getElementById('btnPrev');
  const btnNext       = document.getElementById('btnNext');
  const btnPlay       = document.getElementById('btnPlay');
  const btnLoadDemo   = document.getElementById('btnLoadDemo');

  // ---- Tab switching ----
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ---- Load demo conversation ----
  btnLoadDemo.addEventListener('click', loadDemo);

  async function loadDemo() {
    spinner.classList.add('show');
    try {
      const res = await fetch('/api/demo-conversation');
      conversation = await res.json();
      speakerMap = {};
      conversation.participants.forEach(p => { speakerMap[p.id] = p; });

      // Run analysis
      const analysisRes = await fetch('/api/conversation/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation.messages }),
      });
      analysis = await analysisRes.json();

      // Update mode banner
      const modeBanner = document.getElementById('modeBanner');
      if (analysis.mode && analysis.mode !== 'synthetic-demo') {
        modeBanner.textContent = 'LIVE: ' + analysis.mode.toUpperCase() + ' GEOMETRY';
        modeBanner.className = 'mode-banner mode-live';
      } else {
        modeBanner.textContent = 'SYNTHETIC DEMO';
        modeBanner.className = 'mode-banner mode-synthetic';
      }

      chatHeader.textContent = conversation.title || 'Conversation';
      renderConversation();
      renderTimeline();
      selectTurn(0);
    } catch (err) {
      console.error('Failed to load demo:', err);
    } finally {
      spinner.classList.remove('show');
    }
  }

  // ---- Conversation rendering ----
  function renderConversation() {
    if (!analysis) return;
    emptyChat.style.display = 'none';
    chatBody.innerHTML = '';

    const speakers = Object.keys(speakerMap);
    const speakerA = speakers[0] || '';

    analysis.turns.forEach((turn, idx) => {
      const div = document.createElement('div');
      const isA = turn.speaker === speakerA;
      div.className = 'message msg-speaker-' + (isA ? 'a' : 'b');
      div.dataset.turn = idx;

      const speaker = speakerMap[turn.speaker];
      const label = speaker ? speaker.label : turn.speaker;

      let html = '<div class="msg-bubble">';
      html += '<div class="msg-meta">';
      html += '<span class="msg-speaker">' + esc(label) + '</span>';
      html += '<span class="msg-turn">Turn ' + idx + '</span>';
      html += '</div>';
      html += '<div class="msg-text">' + esc(turn.text) + '</div>';

      // Detected value chips (from causal projection)
      if (turn.detected_values && turn.detected_values.length > 0) {
        html += '<div class="msg-values">';
        const isReal = analysis.mode && analysis.mode !== 'synthetic-demo';
        turn.detected_values.forEach(dv => {
          const isNew = turn.values_introduced.includes(dv.term);
          const cls = dv.cos_phi < 0 ? 'negative' : (isNew ? 'new' : '');
          const sign = dv.cos_phi >= 0 ? '+' : '';
          const label = isReal ? 'z' : 'cos\u03A6';
          html += '<span class="value-chip ' + cls + '" title="' + label + ' = ' + dv.cos_phi.toFixed(3) + '">'
            + esc(dv.term) + ' <small>' + sign + dv.cos_phi.toFixed(2) + '</small></span>';
        });
        html += '</div>';
      }

      // New contradiction alerts
      if (turn.new_contradictions.length > 0) {
        turn.new_contradictions.forEach(c => {
          const sev = c.severity >= 0.8 ? 'severe' : c.severity >= 0.5 ? 'moderate' : 'mild';
          html += '<div class="contradiction-alert">';
          html += '<span class="alert-icon">\u26A0</span>';
          html += '<strong>' + sev.toUpperCase() + ':</strong> ';
          html += '"' + esc(c.term_a) + '" \u2194 "' + esc(c.term_b) + '" ';
          html += '(cos: ' + c.causal_cosine.toFixed(3) + ')';
          html += '</div>';
        });
      }

      html += '</div>';
      div.innerHTML = html;
      div.addEventListener('click', () => selectTurn(idx));
      chatBody.appendChild(div);
    });
  }

  // ---- Turn selection ----
  function selectTurn(idx) {
    if (!analysis || idx < 0 || idx >= analysis.turns.length) return;
    currentTurn = idx;

    // Update message highlights
    document.querySelectorAll('.message').forEach(el => {
      const t = parseInt(el.dataset.turn);
      el.classList.toggle('selected', t === idx);
      el.classList.toggle('dimmed', t > idx);
    });

    const turn = analysis.turns[idx];

    // Scroll selected message into view
    const sel = document.querySelector('.message.selected');
    if (sel) sel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Update score display
    updateScore(turn.coherence_score);
    updateTrust(turn.trust_score);

    // Update term legend
    updateTermLegend(turn);

    // Update timeline highlight
    updateTimelineHighlight(idx);

    // Update analysis panels
    renderContradictions(turn);
    renderRedundancies(turn);
    renderChordDiagram(turn);
    renderHeatmap(turn);
    const prevTurn = idx > 0 ? analysis.turns[idx - 1] : null;
    renderSphere(turn, prevTurn);
  }

  // ---- Score display ----
  function updateScore(s) {
    scoreValue.textContent = s.toFixed(2);
    scoreValue.style.color = scoreColour(s);
    if (s >= 0.9) scoreLabel.textContent = 'COHERENT';
    else if (s >= 0.7) scoreLabel.textContent = 'DRIFTING';
    else if (s >= 0.4) scoreLabel.textContent = 'INCOHERENT';
    else scoreLabel.textContent = 'CONTRADICTORY';
    scoreLabel.style.color = scoreColour(s);
  }

  function updateTrust(t) {
    trustValue.textContent = t.toFixed(2);
    trustValue.style.color = trustColour(t);
    if (t >= 0.8) trustLabel.textContent = 'TRUSTWORTHY';
    else if (t >= 0.5) trustLabel.textContent = 'UNCERTAIN';
    else if (t >= 0.2) trustLabel.textContent = 'SUSPICIOUS';
    else trustLabel.textContent = 'UNTRUSTWORTHY';
    trustLabel.style.color = trustColour(t);
  }

  function trustColour(t) {
    if (t >= 0.8) return '#3fb950';
    if (t >= 0.5) return '#d29922';
    if (t >= 0.2) return '#f0883e';
    return '#f85149';
  }

  function scoreColour(s) {
    if (s >= 0.9) return '#3fb950';
    if (s >= 0.7) return '#d29922';
    if (s >= 0.4) return '#f0883e';
    return '#f85149';
  }

  // ---- Term legend ----
  function updateTermLegend(turn) {
    termLegend.innerHTML = '';
    const introduced = new Set(turn.values_introduced);
    turn.cumulative_values.forEach(v => {
      const chip = document.createElement('span');
      chip.className = 'legend-chip' + (introduced.has(v) ? ' active' : '');
      chip.textContent = v;
      termLegend.appendChild(chip);
    });
  }

  // ---- Coherence timeline chart ----
  function renderTimeline() {
    if (!analysis) return;
    timelineChart.innerHTML = '';

    const turns = analysis.turns;
    const w = timelineChart.clientWidth;
    const h = timelineChart.clientHeight;
    const margin = { top: 6, right: 12, bottom: 18, left: 6 };
    const innerW = w - margin.left - margin.right;
    const innerH = h - margin.top - margin.bottom;

    const svg = d3.select(timelineChart).append('svg')
      .attr('width', w).attr('height', h);

    const g = svg.append('g')
      .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    const x = d3.scaleLinear().domain([0, turns.length - 1]).range([0, innerW]);
    const y = d3.scaleLinear().domain([0, 1]).range([innerH, 0]);

    // Area fill
    const area = d3.area()
      .x((d, i) => x(i))
      .y0(innerH)
      .y1(d => y(d.coherence_score))
      .curve(d3.curveMonotoneX);

    // Gradient
    const defs = svg.append('defs');
    const grad = defs.append('linearGradient')
      .attr('id', 'areaGrad').attr('x1', '0').attr('x2', '0').attr('y1', '0').attr('y2', '1');
    grad.append('stop').attr('offset', '0%').attr('stop-color', '#3fb950').attr('stop-opacity', 0.3);
    grad.append('stop').attr('offset', '100%').attr('stop-color', '#f85149').attr('stop-opacity', 0.05);

    g.append('path').datum(turns).attr('d', area).attr('fill', 'url(#areaGrad)');

    // Line (coherence)
    const line = d3.line()
      .x((d, i) => x(i))
      .y(d => y(d.coherence_score))
      .curve(d3.curveMonotoneX);

    g.append('path').datum(turns)
      .attr('d', line).attr('fill', 'none')
      .attr('stroke', '#58a6ff').attr('stroke-width', 2);

    // Trust line (dashed, orange-red)
    const trustLine = d3.line()
      .x((d, i) => x(i))
      .y(d => y(d.trust_score))
      .curve(d3.curveMonotoneX);

    g.append('path').datum(turns)
      .attr('d', trustLine).attr('fill', 'none')
      .attr('stroke', '#f0883e').attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '6,3');

    // Dots (coherence)
    g.selectAll('circle.dot')
      .data(turns)
      .join('circle')
      .attr('class', 'dot')
      .attr('cx', (d, i) => x(i))
      .attr('cy', d => y(d.coherence_score))
      .attr('r', 4)
      .attr('fill', d => scoreColour(d.coherence_score))
      .attr('stroke', '#0d1117').attr('stroke-width', 1.5)
      .style('cursor', 'pointer')
      .on('click', (event, d) => selectTurn(d.turn));

    // Highlight indicator (movable)
    g.append('circle')
      .attr('id', 'timelineHighlight')
      .attr('r', 7).attr('fill', 'none')
      .attr('stroke', '#f0f6fc').attr('stroke-width', 2)
      .attr('opacity', 0);

    // Turn labels
    g.append('g')
      .attr('transform', 'translate(0,' + innerH + ')')
      .selectAll('text')
      .data(turns)
      .join('text')
      .attr('x', (d, i) => x(i))
      .attr('y', 14)
      .attr('text-anchor', 'middle')
      .attr('fill', '#484f58')
      .attr('font-size', '9px')
      .text((d, i) => i);

    // Store scale refs for highlight updates
    timelineChart._x = x;
    timelineChart._y = y;
  }

  function updateTimelineHighlight(idx) {
    if (!analysis || !timelineChart._x) return;
    const x = timelineChart._x;
    const y = timelineChart._y;
    const turn = analysis.turns[idx];
    const highlight = d3.select('#timelineHighlight');
    highlight
      .attr('cx', x(idx))
      .attr('cy', y(turn.coherence_score))
      .attr('opacity', 1)
      .attr('stroke', scoreColour(turn.coherence_score));
  }

  // ---- Navigation controls ----
  btnPrev.addEventListener('click', () => {
    if (analysis && currentTurn > 0) selectTurn(currentTurn - 1);
  });

  btnNext.addEventListener('click', () => {
    if (analysis && currentTurn < analysis.turns.length - 1) selectTurn(currentTurn + 1);
  });

  btnPlay.addEventListener('click', () => {
    if (playInterval) {
      clearInterval(playInterval);
      playInterval = null;
      btnPlay.innerHTML = '&#x25B6;';
      btnPlay.classList.remove('active');
    } else if (analysis) {
      if (currentTurn >= analysis.turns.length - 1) selectTurn(0);
      btnPlay.innerHTML = '&#x23F8;';
      btnPlay.classList.add('active');
      playInterval = setInterval(() => {
        if (currentTurn < analysis.turns.length - 1) {
          selectTurn(currentTurn + 1);
        } else {
          clearInterval(playInterval);
          playInterval = null;
          btnPlay.innerHTML = '&#x25B6;';
          btnPlay.classList.remove('active');
        }
      }, 1800);
    }
  });

  // ---- Contradictions tab ----
  function renderContradictions(turn) {
    const el = document.getElementById('tab-contradictions');
    if (turn.all_contradictions.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>No contradictions at this point in the conversation</p></div>';
      return;
    }
    const newKeys = new Set(turn.new_contradictions.map(c => c.term_a + '|' + c.term_b));
    const sorted = [...turn.all_contradictions].sort((a, b) => b.severity - a.severity);
    el.innerHTML = sorted.map(c => {
      const sev = c.severity >= 0.8 ? 'severe' : c.severity >= 0.5 ? 'moderate' : 'mild';
      const isNew = newKeys.has(c.term_a + '|' + c.term_b);
      return '<div class="finding-card ' + sev + (isNew ? ' is-new' : '') + '">' +
        '<div class="finding-header">' +
        '<span class="finding-terms">\u201C' + esc(c.term_a) + '\u201D \u2194 \u201C' + esc(c.term_b) + '\u201D</span>' +
        '<span>' +
        '<span class="finding-badge ' + sev + '">' + sev + '</span>' +
        (isNew ? '<span class="finding-badge new-badge">new</span>' : '') +
        '</span></div>' +
        '<div class="finding-metrics">' +
        'cosine: ' + c.causal_cosine.toFixed(3) + ' &nbsp;|&nbsp; ' +
        'angle: ' + c.angle_degrees.toFixed(1) + '&deg; &nbsp;|&nbsp; ' +
        'severity: ' + c.severity.toFixed(2) + '</div></div>';
    }).join('');
  }

  // ---- Chord diagram ----
  function renderChordDiagram(turn) {
    const container = document.getElementById('chordViz');
    container.innerHTML = '';
    const terms = getTermList(turn);
    const n = terms.length;
    if (n < 2) { container.innerHTML = '<div class="empty-state"><p>Need 2+ resolved terms</p></div>'; return; }

    const size = Math.min(480, window.innerWidth - 540);
    const outerRadius = size / 2 - 40;
    const innerRadius = outerRadius - 18;

    const matrix = [];
    for (let i = 0; i < n; i++) {
      matrix[i] = [];
      for (let j = 0; j < n; j++) {
        if (i === j) { matrix[i][j] = 0; continue; }
        const p = findPair(turn.pairwise, terms[i], terms[j]);
        matrix[i][j] = p ? Math.abs(p.causal_cosine) : 0;
      }
    }

    const svg = d3.select(container).append('svg')
      .attr('width', size).attr('height', size)
      .append('g').attr('transform', 'translate(' + size/2 + ',' + size/2 + ')');

    const chord = d3.chord().padAngle(0.05).sortSubgroups(d3.descending);
    const chords = chord(matrix);
    const arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius);
    const ribbon = d3.ribbon().radius(innerRadius);
    const colour = d3.scaleOrdinal(d3.schemeTableau10);

    svg.append('g').selectAll('path').data(chords.groups).join('path')
      .attr('d', arc).attr('fill', d => colour(d.index)).attr('stroke', '#0d1117');

    svg.append('g').selectAll('text').data(chords.groups).join('text')
      .each(d => { d.angle = (d.startAngle + d.endAngle) / 2; })
      .attr('dy', '0.35em')
      .attr('transform', d =>
        'rotate(' + (d.angle * 180 / Math.PI - 90) + ')' +
        'translate(' + (outerRadius + 8) + ')' +
        (d.angle > Math.PI ? 'rotate(180)' : ''))
      .attr('text-anchor', d => d.angle > Math.PI ? 'end' : null)
      .attr('fill', '#c9d1d9').attr('font-size', '11px')
      .text(d => terms[d.index]);

    svg.append('g').attr('fill-opacity', 0.6).selectAll('path')
      .data(chords).join('path').attr('d', ribbon)
      .attr('fill', d => {
        const p = findPair(turn.pairwise, terms[d.source.index], terms[d.target.index]);
        if (!p) return '#484f58';
        if (p.relation === 'Opposed') return '#f85149';
        if (p.relation === 'Aligned') return '#3fb950';
        return '#484f58';
      })
      .attr('stroke', '#0d1117').attr('stroke-width', 0.5)
      .append('title').text(d => {
        const p = findPair(turn.pairwise, terms[d.source.index], terms[d.target.index]);
        return p ? p.term_a + ' \u2194 ' + p.term_b + '\ncos: ' + p.causal_cosine.toFixed(3) + ' (' + p.relation + ')' : '';
      });
  }

  // ---- Heatmap ----
  function renderHeatmap(turn) {
    const container = document.getElementById('heatmapViz');
    container.innerHTML = '';
    const terms = getTermList(turn);
    const n = terms.length;
    if (n < 2) { container.innerHTML = '<div class="empty-state"><p>Need 2+ resolved terms</p></div>'; return; }

    const cellSize = Math.min(44, Math.max(18, 400 / n));
    const margin = { top: 90, right: 20, bottom: 20, left: 90 };
    const gridSize = n * cellSize;
    const width = gridSize + margin.left + margin.right;
    const height = gridSize + margin.top + margin.bottom;

    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
    const g = svg.append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    const cosineMap = {};
    turn.pairwise.forEach(p => {
      cosineMap[p.term_a + '|' + p.term_b] = p.causal_cosine;
      cosineMap[p.term_b + '|' + p.term_a] = p.causal_cosine;
    });

    const colourScale = d3.scaleDiverging().domain([-1, 0, 1]).interpolator(d3.interpolateRdYlGn);

    const cells = [];
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        if (i === j) { cells.push({ i, j, val: 1.0 }); continue; }
        cells.push({ i, j, val: cosineMap[terms[i] + '|' + terms[j]] || 0 });
      }
    }

    g.selectAll('rect').data(cells).join('rect')
      .attr('x', d => d.j * cellSize).attr('y', d => d.i * cellSize)
      .attr('width', cellSize - 1).attr('height', cellSize - 1).attr('rx', 2)
      .attr('fill', d => colourScale(d.val))
      .on('mouseover', (event, d) => {
        tooltip.style.opacity = 1;
        tooltip.innerHTML = '<strong>' + esc(terms[d.i]) + '</strong> \u2194 <strong>' + esc(terms[d.j]) + '</strong><br>cosine: ' + d.val.toFixed(3);
      })
      .on('mousemove', event => {
        tooltip.style.left = (event.pageX + 12) + 'px';
        tooltip.style.top = (event.pageY - 10) + 'px';
      })
      .on('mouseout', () => { tooltip.style.opacity = 0; });

    g.selectAll('.row-label').data(terms).join('text')
      .attr('class', 'row-label').attr('x', -6)
      .attr('y', (d, i) => i * cellSize + cellSize / 2)
      .attr('dy', '0.35em').attr('text-anchor', 'end')
      .attr('fill', '#c9d1d9').attr('font-size', Math.min(11, cellSize - 4) + 'px')
      .text(d => d);

    g.selectAll('.col-label').data(terms).join('text')
      .attr('class', 'col-label')
      .attr('transform', (d, i) =>
        'translate(' + (i * cellSize + cellSize / 2) + ', -6) rotate(-45)')
      .attr('text-anchor', 'start')
      .attr('fill', '#c9d1d9').attr('font-size', Math.min(11, cellSize - 4) + 'px')
      .text(d => d);

    // Legend
    const legendWidth = 180;
    const legendG = svg.append('g')
      .attr('transform', 'translate(' + margin.left + ',' + (margin.top + gridSize + 10) + ')');
    const defs = svg.append('defs');
    const grad = defs.append('linearGradient').attr('id', 'heatGrad2');
    grad.append('stop').attr('offset', '0%').attr('stop-color', colourScale(-1));
    grad.append('stop').attr('offset', '50%').attr('stop-color', colourScale(0));
    grad.append('stop').attr('offset', '100%').attr('stop-color', colourScale(1));
    legendG.append('rect').attr('width', legendWidth).attr('height', 10).attr('rx', 3).attr('fill', 'url(#heatGrad2)');
    legendG.append('text').attr('y', 22).attr('fill', '#8b949e').attr('font-size', '9px').text('-1 (opposed)');
    legendG.append('text').attr('x', legendWidth).attr('y', 22).attr('fill', '#8b949e').attr('font-size', '9px').attr('text-anchor', 'end').text('+1 (aligned)');
  }

  // ---- Sphere visualisation (3D MDS projection) ----
  function renderSphere(turn, prevTurn) {
    const container = document.getElementById('sphereViz');
    container.innerHTML = '';
    const terms = getTermList(turn);
    const n = terms.length;
    if (n < 2) {
      container.innerHTML = '<div class="empty-state"><p>Need 2+ resolved terms</p></div>';
      return;
    }

    const size = Math.min(520, window.innerWidth - 540);
    const cx = size / 2, cy = size / 2;
    const sphereR = size / 2 - 60; // reference sphere radius in pixels

    // Build previous state for diffing
    const prevPairKeys = new Set();
    const prevActiveSet = new Set();
    if (prevTurn) {
      prevTurn.pairwise.forEach(p => {
        prevPairKeys.add(p.term_a + '|' + p.term_b);
        prevPairKeys.add(p.term_b + '|' + p.term_a);
      });
      (prevTurn.cumulative_values || []).forEach(v => prevActiveSet.add(v));
    }

    // ---- Classical MDS: pairwise causal distances → 3D positions ----
    // Build squared-distance matrix using the true Φ-metric distance
    // (not derived from cosines, which would assume unit Φ-norm)
    const D2 = [];
    for (let i = 0; i < n; i++) {
      D2[i] = new Float64Array(n); // D²[i][i] = 0
    }
    const termIdx = {};
    terms.forEach((t, i) => termIdx[t] = i);
    turn.pairwise.forEach(p => {
      const i = termIdx[p.term_a], j = termIdx[p.term_b];
      if (i !== undefined && j !== undefined) {
        const d2 = p.causal_distance * p.causal_distance;
        D2[i][j] = d2;
        D2[j][i] = d2;
      }
    });

    // Double-centering: B = -0.5 * H * D² * H, where H = I - 1/n * 11^T
    const rowMean = new Float64Array(n);
    const colMean = new Float64Array(n);
    let grandMean = 0;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        rowMean[i] += D2[i][j];
        colMean[j] += D2[i][j];
        grandMean += D2[i][j];
      }
    }
    for (let i = 0; i < n; i++) { rowMean[i] /= n; colMean[i] /= n; }
    grandMean /= (n * n);

    const B = [];
    for (let i = 0; i < n; i++) {
      B[i] = new Float64Array(n);
      for (let j = 0; j < n; j++) {
        B[i][j] = -0.5 * (D2[i][j] - rowMean[i] - colMean[j] + grandMean);
      }
    }

    // Power iteration for top 3 eigenvectors of B
    const coords3d = mds3(B, n);

    // Normalise so the maximum radius is 1 (fits inside reference sphere)
    let maxR = 0;
    for (let i = 0; i < n; i++) {
      const r = Math.sqrt(coords3d[i][0]**2 + coords3d[i][1]**2 + coords3d[i][2]**2);
      if (r > maxR) maxR = r;
    }
    if (maxR > 0) {
      for (let i = 0; i < n; i++) {
        coords3d[i][0] /= maxR;
        coords3d[i][1] /= maxR;
        coords3d[i][2] /= maxR;
      }
    }

    const points = terms.map((term, i) => ({
      term,
      x: coords3d[i][0],
      y: coords3d[i][1],
      z: coords3d[i][2],
      r3d: Math.sqrt(coords3d[i][0]**2 + coords3d[i][1]**2 + coords3d[i][2]**2)
    }));

    // Build pairwise arcs with diff status
    const edges = [];
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const p = findPair(turn.pairwise, terms[i], terms[j]);
        if (p) {
          const key = p.term_a + '|' + p.term_b;
          const existedBefore = prevPairKeys.has(key);
          edges.push({
            si: i, ti: j,
            relation: p.relation,
            cosine: p.causal_cosine,
            isNew: !existedBefore,
            isCarried: existedBefore
          });
        }
      }
    }

    const active = new Set(turn.cumulative_values);
    const introduced = new Set(turn.values_introduced);

    // ---- 3D rotation state ----
    let rotX = -0.3, rotY = 0.4; // radians

    function project(pt) {
      // Rotate Y then X
      let x = pt.x, y = pt.y, z = pt.z;
      // Rotate around Y
      let x1 = x * Math.cos(rotY) + z * Math.sin(rotY);
      let z1 = -x * Math.sin(rotY) + z * Math.cos(rotY);
      // Rotate around X
      let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
      let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
      // Perspective projection (weak perspective)
      const fov = 3.5;
      const scale = fov / (fov + z2);
      return {
        px: cx + x1 * sphereR * scale,
        py: cy - y1 * sphereR * scale,
        z: z2,
        scale: scale
      };
    }

    const svg = d3.select(container).append('svg')
      .attr('width', size).attr('height', size)
      .style('cursor', 'grab');

    // Draw reference sphere (wireframe circles)
    const defs = svg.append('defs');
    const radGrad = defs.append('radialGradient').attr('id', 'sphereBg')
      .attr('cx', '40%').attr('cy', '35%');
    radGrad.append('stop').attr('offset', '0%').attr('stop-color', '#161b22');
    radGrad.append('stop').attr('offset', '100%').attr('stop-color', '#0d1117');

    svg.append('circle')
      .attr('cx', cx).attr('cy', cy).attr('r', sphereR)
      .attr('fill', 'url(#sphereBg)').attr('stroke', '#30363d').attr('stroke-width', 1);

    const edgeGroup = svg.append('g');
    const dotGroup = svg.append('g');
    const labelGroup = svg.append('g');

    function arcColour(rel) {
      if (rel === 'Opposed') return '#f85149';
      if (rel === 'Aligned') return '#3fb950';
      return '#484f58';
    }

    function render() {
      // Project all points
      const projected = points.map(pt => ({ ...pt, ...project(pt) }));

      // Sort by z (back to front) for painter's algorithm
      const sortedIdx = projected.map((_, i) => i).sort((a, b) => projected[a].z - projected[b].z);

      // Clear
      edgeGroup.selectAll('*').remove();
      dotGroup.selectAll('*').remove();
      labelGroup.selectAll('*').remove();

      // Draw wireframe equator + meridian rings for depth cue
      drawWireRing(edgeGroup, 0, 1, 0, '#21262d', 0.3); // equator (XZ plane)
      drawWireRing(edgeGroup, 1, 0, 0, '#21262d', 0.2); // YZ plane
      drawWireRing(edgeGroup, 0, 0, 1, '#21262d', 0.2); // XY plane

      // Draw carried (previous) edges - faded, dashed
      edges.filter(e => e.isCarried).forEach(e => {
        const a = projected[e.si], b = projected[e.ti];
        edgeGroup.append('line')
          .attr('x1', a.px).attr('y1', a.py).attr('x2', b.px).attr('y2', b.py)
          .attr('stroke', arcColour(e.relation))
          .attr('stroke-width', 1)
          .attr('stroke-opacity', 0.2)
          .attr('stroke-dasharray', '4,3')
          .append('title')
          .text(points[e.si].term + ' \u2194 ' + points[e.ti].term +
            '  cos: ' + e.cosine.toFixed(3) + ' (' + e.relation + ') [previous]');
      });

      // Draw new edges - bright, solid
      edges.filter(e => e.isNew).forEach(e => {
        const a = projected[e.si], b = projected[e.ti];
        // Glow
        edgeGroup.append('line')
          .attr('x1', a.px).attr('y1', a.py).attr('x2', b.px).attr('y2', b.py)
          .attr('stroke', arcColour(e.relation))
          .attr('stroke-width', 4).attr('stroke-opacity', 0.12);
        edgeGroup.append('line')
          .attr('x1', a.px).attr('y1', a.py).attr('x2', b.px).attr('y2', b.py)
          .attr('stroke', arcColour(e.relation))
          .attr('stroke-width', 2).attr('stroke-opacity', 0.8)
          .append('title')
          .text(points[e.si].term + ' \u2194 ' + points[e.ti].term +
            '  cos: ' + e.cosine.toFixed(3) + ' (' + e.relation + ') [NEW]');
      });

      // Draw dots and labels in z-sorted order (back to front)
      sortedIdx.forEach(i => {
        const pt = projected[i];
        const isActive = active.has(pt.term);
        const isNew = introduced.has(pt.term);
        const wasPrev = prevActiveSet.has(pt.term);
        const depthFade = 0.4 + 0.6 * ((pt.z + 1) / 2); // fade if behind

        let r, fill, stroke, sw;
        if (isNew) {
          r = 8 * pt.scale; fill = '#58a6ff'; stroke = '#79c0ff'; sw = 2.5;
        } else if (isActive && wasPrev) {
          r = 6 * pt.scale; fill = '#8b949e'; stroke = '#30363d'; sw = 1;
        } else if (isActive) {
          r = 7 * pt.scale; fill = '#f0f6fc'; stroke = '#30363d'; sw = 1;
        } else {
          r = 3 * pt.scale; fill = '#21262d'; stroke = '#30363d'; sw = 0.5;
        }

        // Radial distance indicator: ring at the depth of the point
        const distFromOrigin = pt.r3d;
        if (isActive && distFromOrigin > 0.05) {
          dotGroup.append('circle')
            .attr('cx', pt.px).attr('cy', pt.py)
            .attr('r', r + 4 * pt.scale)
            .attr('fill', 'none')
            .attr('stroke', isNew ? '#58a6ff' : '#30363d')
            .attr('stroke-width', 0.5)
            .attr('opacity', 0.3 * depthFade);
        }

        dotGroup.append('circle')
          .attr('cx', pt.px).attr('cy', pt.py).attr('r', r)
          .attr('fill', fill).attr('stroke', stroke)
          .attr('stroke-width', sw)
          .attr('opacity', (isActive ? 1 : 0.3) * depthFade)
          .append('title').text(pt.term +
            ' (r=' + distFromOrigin.toFixed(2) + ')' +
            (isNew ? ' [NEW]' : wasPrev ? ' [previous]' : ''));

        if (isActive || isNew) {
          labelGroup.append('text')
            .attr('x', pt.px).attr('y', pt.py - r - 3)
            .attr('text-anchor', 'middle')
            .attr('fill', isNew ? '#58a6ff' : '#c9d1d9')
            .attr('font-size', (isNew ? 12 : 11) * pt.scale + 'px')
            .attr('font-weight', isNew ? '700' : '500')
            .attr('opacity', depthFade)
            .text(pt.term);
        }
      });
    }

    // Draw a wireframe great circle for a given normal vector
    function drawWireRing(g, nx, ny, nz, colour, opacity) {
      const steps = 60;
      const ringPts = [];
      // Build a basis orthogonal to normal
      let ux, uy, uz, vx, vy, vz;
      if (Math.abs(nx) < 0.9) {
        // cross(normal, [1,0,0])
        ux = 0; uy = nz; uz = -ny;
      } else {
        ux = -nz; uy = 0; uz = nx;
      }
      const uLen = Math.sqrt(ux*ux + uy*uy + uz*uz);
      ux /= uLen; uy /= uLen; uz /= uLen;
      // v = cross(normal, u)
      vx = ny*uz - nz*uy; vy = nz*ux - nx*uz; vz = nx*uy - ny*ux;

      for (let s = 0; s <= steps; s++) {
        const a = (s / steps) * Math.PI * 2;
        const px = Math.cos(a) * ux + Math.sin(a) * vx;
        const py = Math.cos(a) * uy + Math.sin(a) * vy;
        const pz = Math.cos(a) * uz + Math.sin(a) * vz;
        const proj = project({ x: px, y: py, z: pz });
        ringPts.push([proj.px, proj.py]);
      }
      const line = d3.line().curve(d3.curveBasisClosed);
      g.append('path')
        .attr('d', line(ringPts))
        .attr('fill', 'none')
        .attr('stroke', colour)
        .attr('stroke-width', 0.5)
        .attr('opacity', opacity);
    }

    render();

    // Drag to rotate the 3D view
    let dragStartX, dragStartY, startRotX, startRotY;
    const drag = d3.drag()
      .on('start', function(event) {
        dragStartX = event.x; dragStartY = event.y;
        startRotX = rotX; startRotY = rotY;
        d3.select(this).style('cursor', 'grabbing');
      })
      .on('drag', function(event) {
        rotY = startRotY + (event.x - dragStartX) * 0.008;
        rotX = startRotX + (event.y - dragStartY) * 0.008;
        render();
      })
      .on('end', function() {
        d3.select(this).style('cursor', 'grab');
      });

    svg.call(drag);

    // Legend
    const legend = d3.select(container).append('div')
      .style('display', 'flex').style('gap', '16px').style('padding', '10px 0')
      .style('justify-content', 'center').style('flex-wrap', 'wrap')
      .style('font-size', '11px').style('color', '#8b949e');

    [
      { label: 'New this turn', color: '#58a6ff', dash: false },
      { label: 'Previous', color: '#8b949e', dash: true },
      { label: 'Opposed', color: '#f85149', dash: false },
      { label: 'Aligned', color: '#3fb950', dash: false },
      { label: 'Near centre = mixed', color: '#484f58', dash: false },
    ].forEach(item => {
      const el = legend.append('span').style('display', 'inline-flex')
        .style('align-items', 'center').style('gap', '4px');
      const sw = el.append('svg').attr('width', 20).attr('height', 10);
      if (item.dash !== undefined) {
        sw.append('line').attr('x1', 0).attr('y1', 5).attr('x2', 20).attr('y2', 5)
          .attr('stroke', item.color).attr('stroke-width', 2)
          .attr('stroke-dasharray', item.dash ? '4,3' : 'none');
      } else {
        sw.append('circle').attr('cx', 10).attr('cy', 5).attr('r', 4).attr('fill', item.color);
      }
      el.append('span').text(item.label);
    });
  }

  // ---- Classical MDS: extract top-3 eigenvectors via power iteration ----
  function mds3(B, n) {
    const coords = [];
    // Extract 3 eigenvectors by deflation
    const mat = B.map(row => Float64Array.from(row)); // copy
    for (let dim = 0; dim < 3; dim++) {
      // Power iteration
      let v = new Float64Array(n);
      for (let i = 0; i < n; i++) v[i] = Math.random() - 0.5;
      let eigenvalue = 0;
      for (let iter = 0; iter < 200; iter++) {
        const w = new Float64Array(n);
        for (let i = 0; i < n; i++) {
          let s = 0;
          for (let j = 0; j < n; j++) s += mat[i][j] * v[j];
          w[i] = s;
        }
        let norm = 0;
        for (let i = 0; i < n; i++) norm += w[i] * w[i];
        norm = Math.sqrt(norm);
        if (norm < 1e-12) break;
        eigenvalue = norm;
        for (let i = 0; i < n; i++) v[i] = w[i] / norm;
      }
      // Store eigenvector scaled by sqrt(eigenvalue)
      const scale = eigenvalue > 0 ? Math.sqrt(eigenvalue) : 0;
      for (let i = 0; i < n; i++) {
        if (!coords[i]) coords[i] = [0, 0, 0];
        coords[i][dim] = v[i] * scale;
      }
      // Deflate: subtract eigenvalue * v * v^T
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          mat[i][j] -= eigenvalue * v[i] * v[j];
        }
      }
    }
    return coords;
  }

  // ---- Helpers ----
  function getTermList(turn) {
    const s = new Set();
    turn.pairwise.forEach(p => { s.add(p.term_a); s.add(p.term_b); });
    return [...s].sort();
  }

  function findPair(pairwise, a, b) {
    return pairwise.find(p =>
      (p.term_a === a && p.term_b === b) || (p.term_a === b && p.term_b === a));
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') { btnPrev.click(); e.preventDefault(); }
    if (e.key === 'ArrowRight') { btnNext.click(); e.preventDefault(); }
    if (e.key === ' ') { btnPlay.click(); e.preventDefault(); }
  });
})();
</script>
